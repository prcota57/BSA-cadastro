<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>BSA Finanças</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --wine:#6B1E2F; --wine-dark:#4A1420; --wine-soft:#F3E3E6;
    --blue:#1B3A6B; --blue-soft:#E8EDF5;
    --gold:#D4A017; --gold-soft:#FBF0D6;
    --danger:#C1443C; --danger-soft:#FBE4E2;
    --bg:#F7F7F9; --surface:#FFFFFF; --ink:#1F1F24; --ink-soft:#6B6B75; --line:#E5E5EA;
    --radius:18px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif;}
  body{padding-bottom:calc(80px + env(safe-area-inset-bottom)); padding-top:env(safe-area-inset-top);}
  .mono{font-family:'IBM Plex Mono',monospace;}

  header.top{
    position:sticky; top:0; z-index:20; background:var(--wine); color:#fff;
    padding:18px 20px 16px; border-radius:0 0 22px 22px; box-shadow:0 6px 18px rgba(107,30,47,0.22);
  }
  header.top h1{font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:700; margin:0;}
  header.top .sub{font-size:12.5px; opacity:0.85; margin-top:2px;}

  main{padding:16px 16px 20px; max-width:600px; margin:0 auto;}

  .panel{background:var(--surface); border-radius:var(--radius); padding:16px; margin-bottom:14px; border:1px solid var(--line); box-shadow:0 2px 8px rgba(31,31,36,0.04);}
  .panel h2{font-family:'Space Grotesk'; font-size:15.5px; margin:0 0 12px;}

  .stat-row{display:flex; gap:10px; margin-bottom:14px;}
  .stat{flex:1; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:12px 10px;}
  .stat .lbl{font-size:10.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.03em; font-weight:600;}
  .stat .num{font-family:'Space Grotesk'; font-size:19px; font-weight:700; margin-top:4px;}
  .stat.recebido .num{color:var(--blue);}
  .stat.areceber .num{color:var(--gold);}
  .stat.inadimplencia .num{color:var(--danger);}

  .pie-wrap{display:flex; align-items:center; gap:20px; padding:6px 4px;}
  .pie{width:120px; height:120px; border-radius:50%; flex:0 0 auto;}
  .legend{flex:1;}
  .legend-row{display:flex; align-items:center; gap:8px; font-size:13px; margin-bottom:8px;}
  .legend-dot{width:11px; height:11px; border-radius:50%; flex:0 0 auto;}
  .legend-row .n{font-weight:700; margin-left:auto; font-family:'Space Grotesk';}

  .tabs{display:flex; gap:8px; margin-bottom:14px; position:sticky; top:80px; z-index:10; background:var(--bg); padding:4px 0;}
  .tab-btn{flex:1; padding:11px 4px; border-radius:14px; border:1.5px solid var(--line); background:var(--surface); color:var(--ink-soft); font-family:'Space Grotesk'; font-weight:700; font-size:13.5px; cursor:pointer; text-align:center;}
  .tab-btn.active{background:var(--wine); color:#fff; border-color:var(--wine);}

  .search-box{width:100%; padding:12px 14px; border-radius:14px; border:1.5px solid var(--line); font-size:14px; margin-bottom:12px; background:var(--surface);}

  .row-card{display:flex; align-items:center; gap:12px; padding:13px 14px; border-radius:14px; border:1px solid var(--line); background:var(--surface); margin-bottom:10px;}
  .avatar{width:40px; height:40px; border-radius:50%; object-fit:cover; background:var(--wine-soft); flex:0 0 auto; display:flex; align-items:center; justify-content:center; font-family:'Space Grotesk'; font-weight:700; color:var(--wine); font-size:13px;}
  .row-card .info{flex:1; min-width:0;}
  .row-card .name{font-weight:600; font-size:14px;}
  .row-card .meta{font-size:11.5px; color:var(--ink-soft); margin-top:1px;}
  .pill{font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px; font-family:'Space Grotesk'; flex:0 0 auto; white-space:nowrap;}
  .pill.pago{background:var(--blue-soft); color:var(--blue);}
  .pill.pendente{background:var(--gold-soft); color:#8A6D00;}
  .pill.atrasado{background:var(--danger-soft); color:var(--danger);}
  .pill.semconfig{background:var(--line); color:var(--ink-soft);}

  .btn{border:none; border-radius:12px; padding:11px 14px; font-family:'Space Grotesk'; font-weight:600; font-size:13.5px; cursor:pointer; text-align:center;}
  .btn-primary{background:var(--wine); color:#fff; width:100%;}
  .btn-gold{background:var(--gold); color:#4A1420;}
  .btn-blue{background:var(--blue); color:#fff;}
  .btn-outline{background:none; border:1.5px solid var(--line); color:var(--ink);}
  .btn-row{display:flex; gap:8px; margin-top:8px;}
  .btn-row .btn{flex:1;}

  .empty{text-align:center; padding:34px 20px; color:var(--ink-soft); font-size:13.5px;}

  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:5px;}
  .field input,.field select{width:100%; padding:11px; border-radius:10px; border:1.5px solid var(--line); font-size:14px; background:var(--surface); font-family:'Inter';}

  .back-btn{background:none; border:none; color:#fff; font-size:15px; font-family:'Space Grotesk'; font-weight:600; display:flex; align-items:center; gap:4px; margin-bottom:6px; padding:0;}

  .history-row{display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px dashed var(--line); font-size:13px;}
  .history-row:last-child{border-bottom:none;}

  .banner{background:var(--gold-soft); border-radius:14px; padding:13px 14px; font-size:12.5px; color:#7A5A00; margin-bottom:14px;}

  .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--wine-dark); color:#fff; padding:11px 20px; border-radius:30px; font-size:13.5px; font-weight:600; z-index:200; opacity:0; transition:opacity 0.25s; box-shadow:0 6px 16px rgba(0,0,0,0.2); pointer-events:none; max-width:90vw;}
  .toast.show{opacity:1;}
  .setup-banner{margin:0 0 14px; padding:14px; background:var(--danger-soft); border-radius:14px; color:#8A2E19; font-size:13px; line-height:1.5;}
  .setup-banner b{display:block; margin-bottom:4px; font-family:'Space Grotesk';}
  .spinner{width:18px; height:18px; border:2.5px solid var(--wine-soft); border-top-color:var(--wine); border-radius:50%; animation:spin 0.8s linear infinite; margin:30px auto;}
  @keyframes spin{to{transform:rotate(360deg);}}
.btn-hub-fixed{position:fixed; top:calc(env(safe-area-inset-top) + 12px); left:12px; z-index:999; width:34px; height:34px; border-radius:50%; background:rgba(0,0,0,0.55); color:#fff; font-size:17px; display:flex; align-items:center; justify-content:center; text-decoration:none; box-shadow:0 2px 8px rgba(0,0,0,0.25);}
</style>
</head>
<body>

<a class="btn-hub-fixed" href="https://prcota57.github.io/BSA-cadastro/" title="Voltar ao início">&#8592;</a>

<header class="top">
  <div id="backWrap"></div>
  <h1 id="headerTitle">BSA Finanças</h1>
  <div class="sub" id="statusLine">conectando...</div>
</header>

<main id="app">
  <div class="spinner"></div>
</main>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
(function(){

var firebaseConfig = {
  apiKey: "AIzaSyDmM2m_QnEeRflAKCyb11TzOrZM7iVgLCA",
  authDomain: "bsa-app-493c3.firebaseapp.com",
  projectId: "bsa-app-493c3",
  storageBucket: "bsa-app-493c3.firebasestorage.app",
  messagingSenderId: "455452879388",
  appId: "1:455452879388:web:7135d93c116b2fe7cfcdd9"
};
var db = null;
var state = { screen:'dashboard', alunos:[], todosAlunoIds:[], mensalidades:[], movimentacoes:[], movTab:'entrada', search:'', searchInad:'', currentAlunoId:null, filaLista:[], filaIndex:0 };

function initFirebase(){
  if(firebaseConfig.apiKey === "COLE_AQUI"){
    document.getElementById('app').innerHTML = '<div class="setup-banner"><b>Configuração necessária</b>Preencha o firebaseConfig.</div>';
    return;
  }
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  var auth = firebase.auth();
  auth.signInAnonymously().catch(function(){});
  auth.onAuthStateChanged(function(user){
    if(user){
      document.getElementById('statusLine').textContent = 'conectado';
      carregarTudo();
    }
  });
}

function pad(n){ return String(n).padStart(2,'0'); }
function isoDate(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function mesAtualStr(){ var d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1); }
function hojeStr(){ return isoDate(new Date()); }
function amanhaStr(){ var d = new Date(); d.setDate(d.getDate()+1); return isoDate(d); }
function onlyDigits(s){ return (s||'').replace(/\D/g,''); }
function fmtMoeda(v){ return 'R$ ' + (Number(v)||0).toFixed(2).replace('.',','); }
function fmtDataBR(iso){ if(!iso) return '—'; var p=iso.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function iniciais(nome){ return (nome||'?').split(' ').filter(Boolean).slice(0,2).map(function(p){return p[0].toUpperCase();}).join(''); }
function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 2800);
}

function calcularDataVencimento(mesStr, dia){
  var partes = mesStr.split('-');
  var ano = parseInt(partes[0],10), mes = parseInt(partes[1],10);
  var ultimoDiaDoMes = new Date(ano, mes, 0).getDate();
  var diaFinal = Math.min(dia, ultimoDiaDoMes);
  return ano+'-'+pad(mes)+'-'+pad(diaFinal);
}

var CONTAS_FIXAS = [
  {nome:'Aluguel Mauro', valor:2000, diaVencimento:1},
  {nome:'Salário Iasmin', valor:1600, diaVencimento:10},
  {nome:'Fatura cartão', valor:1000, diaVencimento:15}
];
function diasParaVencerFixa(dia){
  var venc = calcularDataVencimento(mesAtualStr(), dia);
  var d1 = new Date(venc+'T00:00:00'), d2 = new Date(hojeStr()+'T00:00:00');
  return Math.round((d1-d2)/86400000);
}

async function carregarTudo(){
  try{
    var alunosSnap = await db.collection('alunos').get();
    state.alunos = [];
    state.todosAlunoIds = [];
    alunosSnap.forEach(function(doc){
      var d = doc.data();
      state.todosAlunoIds.push(doc.id);
      if(d.statusGeral === 'inativo') return;
      state.alunos.push({
        id: doc.id, nome: d.nome||'(sem nome)', unidade: d.unidade||'',
        foto: d.foto||null, responsavelNome: d.responsavelNome||'',
        responsavelWhatsapp: d.responsavelWhatsapp||'',
        valorMensalidade: d.valorMensalidade || null,
        diaVencimento: d.diaVencimento || null
      });
    });
    await garantirMensalidadesDoMes();
    await carregarMensalidades();
    await carregarMovimentacoes();
    render();
  }catch(err){
    document.getElementById('app').innerHTML = '<div class="setup-banner"><b>Erro ao carregar</b>'+err.message+'</div>';
  }
}

async function garantirMensalidadesDoMes(){
  var mes = mesAtualStr();
  var existentesSnap = await db.collection('mensalidades').where('mesReferencia','==',mes).get();
  var existentesPorId = {};
  existentesSnap.forEach(function(doc){ existentesPorId[doc.id] = Object.assign({id:doc.id}, doc.data()); });

  var batch = db.batch();
  var algumaAlteracao = false;
  state.alunos.forEach(function(a){
    if(!a.valorMensalidade || !a.diaVencimento) return;
    var id = a.id + '_' + mes;
    var existente = existentesPorId[id];
    if(!existente){
      var ref = db.collection('mensalidades').doc(id);
      batch.set(ref, {
        alunoId: a.id, nomeAluno: a.nome, unidade: a.unidade,
        responsavelNome: a.responsavelNome, responsavelWhatsapp: a.responsavelWhatsapp,
        mesReferencia: mes, valor: a.valorMensalidade, diaVencimento: a.diaVencimento,
        dataVencimento: calcularDataVencimento(mes, a.diaVencimento),
        dataPagamento: null, statusPagamento: 'pendente'
      });
      algumaAlteracao = true;
    } else if(existente.statusPagamento !== 'pago' && (existente.valor !== a.valorMensalidade || existente.diaVencimento !== a.diaVencimento)){
      // Aluno já tem mensalidade do mês gerada, mas o cadastro mudou o valor/dia depois — sincroniza (só se ainda não foi paga)
      var ref2 = db.collection('mensalidades').doc(id);
      batch.update(ref2, {
        valor: a.valorMensalidade, diaVencimento: a.diaVencimento,
        dataVencimento: calcularDataVencimento(mes, a.diaVencimento),
        nomeAluno: a.nome, responsavelNome: a.responsavelNome, responsavelWhatsapp: a.responsavelWhatsapp
      });
      algumaAlteracao = true;
    }
  });
  if(algumaAlteracao) await batch.commit();
}

async function carregarMensalidades(){
  var snap = await db.collection('mensalidades').get();
  state.mensalidades = [];
  snap.forEach(function(doc){ state.mensalidades.push(Object.assign({id:doc.id}, doc.data())); });
}

async function carregarMovimentacoes(){
  var snap = await db.collection('movimentacoesFinanceiras').get();
  state.movimentacoes = [];
  snap.forEach(function(doc){ state.movimentacoes.push(Object.assign({id:doc.id}, doc.data())); });
}

function statusComputado(m){
  if(m.statusPagamento === 'pago') return 'pago';
  if(m.statusPagamento === 'isento') return 'isento';
  if(hojeStr() > m.dataVencimento) return 'atrasado';
  return 'pendente';
}
function diasAtraso(m){
  var d1 = new Date(m.dataVencimento+'T00:00:00'), d2 = new Date(hojeStr()+'T00:00:00');
  return Math.max(0, Math.round((d2-d1)/86400000));
}
function mensalidadeDoMes(alunoId, mes){
  return state.mensalidades.find(function(m){ return m.alunoId===alunoId && m.mesReferencia===mes; });
}
function waLink(phone, texto){
  return 'https://wa.me/55' + onlyDigits(phone) + '?text=' + encodeURIComponent(texto);
}
function msgLembrete(a){
  return 'Olá, '+a.responsavelNome+'! Passando para lembrar que hoje vence a mensalidade do(a) '+a.nome+' na BSA. Para sua comodidade, o pagamento pode ser feito via Pix utilizando a chave cadastrada. Caso já tenha realizado, por favor, desconsidere este aviso. Agradecemos a parceria! Esporte é vida!';
}
function msgLembreteVespera(a){
  return 'Olá, '+a.responsavelNome+'! Passando para avisar que amanhã vence a mensalidade do(a) '+a.nome+' na BSA. Assim vocês já se programam com antecedência. Qualquer dúvida, estamos à disposição por aqui. Um abraço da equipe BSA!';
}
function msgCobranca(a){
  return 'Olá! 👋🏻⚽\n\nNotamos que a mensalidade da escola de futebol do seu filho está em atraso.\nEsta é uma mensagem automática do nosso sistema apenas para lembrar do pagamento.\nCaso já tenha sido efetuado, desconsidere, pedimos que envie o comprovante para este número.\n\nQualquer dúvida, estamos à disposição! 🙏🏻';
}

function setHeader(title, sub, showBack){
  document.getElementById('headerTitle').textContent = title;
  document.getElementById('statusLine').textContent = sub;
  document.getElementById('backWrap').innerHTML = showBack ? '<button class="back-btn" data-action="voltar">&#8592; Voltar</button>' : '';
}

/* ---------- render router ---------- */
function render(){
  var app = document.getElementById('app');
  if(state.screen==='dashboard') return renderDashboard(app);
  if(state.screen==='hoje') return renderHoje(app);
  if(state.screen==='inadimplentes') return renderInadimplentes(app);
  if(state.screen==='filaCobranca') return renderFilaCobranca(app);
  if(state.screen==='recorrentes') return renderRecorrentes(app);
  if(state.screen==='alunos') return renderAlunos(app);
  if(state.screen==='alunoDetail') return renderAlunoDetail(app);
  if(state.screen==='movimentacoes') return renderMovimentacoes(app);
}

var CATEGORIAS_ENTRADA = {matricula:'Taxa de matrícula', uniforme:'Uniforme'};
var CATEGORIAS_SAIDA = {aluguel:'Aluguel', salario:'Salário', material:'Material', uniforme:'Uniforme', outro:'Outro'};

function renderMovimentacoes(app){
  setHeader('BSA Finanças', 'conectado', false);
  var mes = mesAtualStr();
  var doMes = state.movimentacoes.filter(function(x){ return (x.data||'').slice(0,7)===mes; });
  var entradasMes = doMes.filter(function(x){ return x.tipo==='entrada'; });
  var saidasMes = doMes.filter(function(x){ return x.tipo==='saida'; });
  var totalEntradas = entradasMes.reduce(function(s,x){ return s+(Number(x.valor)||0); },0);
  var totalSaidas = saidasMes.reduce(function(s,x){ return s+(Number(x.valor)||0); },0);

  var html = tabsHtml();

  html += '<div class="stat-row">'
    + '<div class="stat recebido"><div class="lbl">Entradas extras (mês)</div><div class="num">'+fmtMoeda(totalEntradas)+'</div></div>'
    + '<div class="stat areceber"><div class="lbl">Saídas (mês)</div><div class="num">'+fmtMoeda(totalSaidas)+'</div></div>'
    + '</div>';

  html += '<div class="tabs">'
    + '<button class="tab-btn'+(state.movTab==='entrada'?' active':'')+'" data-action="irMovTabEntrada">Nova entrada</button>'
    + '<button class="tab-btn'+(state.movTab==='saida'?' active':'')+'" data-action="irMovTabSaida">Nova saída</button>'
    + '</div>';

  if(state.movTab==='entrada'){
    var alunosOrdenados = state.alunos.slice().sort(function(a,b){ return a.nome.localeCompare(b.nome); });
    html += '<div class="panel"><h2>Registrar entrada (matrícula / uniforme)</h2>'
      + '<div class="field"><label>Aluno</label><select id="movAluno">'
      + '<option value="">Selecione o aluno</option>'
      + alunosOrdenados.map(function(a){ return '<option value="'+a.id+'">'+a.nome+'</option>'; }).join('')
      + '</select></div>'
      + '<div class="field"><label>Tipo</label><select id="movCategoriaEntrada">'
      + Object.keys(CATEGORIAS_ENTRADA).map(function(k){ return '<option value="'+k+'">'+CATEGORIAS_ENTRADA[k]+'</option>'; }).join('')
      + '</select></div>'
      + '<div class="field"><label>Valor (R$)</label><input type="number" id="movValorEntrada" step="0.01" min="0" placeholder="ex: 150"></div>'
      + '<div class="field"><label>Data</label><input type="date" id="movDataEntrada" value="'+hojeStr()+'"></div>'
      + '<div class="field"><label>Observação (opcional)</label><input type="text" id="movDescEntrada" placeholder="ex: tamanho G, 2ª via..."></div>'
      + '<button class="btn btn-primary" data-action="salvarEntrada">Salvar entrada</button>'
      + '</div>';
  } else {
    html += '<div class="panel"><h2>Registrar saída (o que você pagou)</h2>'
      + '<div class="field"><label>Categoria</label><select id="movCategoriaSaida">'
      + Object.keys(CATEGORIAS_SAIDA).map(function(k){ return '<option value="'+k+'">'+CATEGORIAS_SAIDA[k]+'</option>'; }).join('')
      + '</select></div>'
      + '<div class="field"><label>Valor (R$)</label><input type="number" id="movValorSaida" step="0.01" min="0" placeholder="ex: 300"></div>'
      + '<div class="field"><label>Data</label><input type="date" id="movDataSaida" value="'+hojeStr()+'"></div>'
      + '<div class="field"><label>Descrição (opcional)</label><input type="text" id="movDescSaida" placeholder="ex: aluguel Estoril, salário..."></div>'
      + '<button class="btn btn-primary" data-action="salvarSaida">Salvar saída</button>'
      + '</div>';
  }

  var doMesOrdenado = doMes.slice().sort(function(a,b){ return (b.data||'').localeCompare(a.data||''); });
  html += '<div class="panel"><h2>Lançamentos do mês</h2>';
  if(doMesOrdenado.length===0){
    html += '<div class="empty">Nenhum lançamento neste mês ainda.</div>';
  } else {
    doMesOrdenado.forEach(function(x){
      var label = x.tipo==='entrada' ? (CATEGORIAS_ENTRADA[x.categoria]||x.categoria) : (CATEGORIAS_SAIDA[x.categoria]||x.categoria);
      var quem = x.tipo==='entrada' ? (x.nomeAluno||'') : (x.descricao||'');
      html += '<div class="row-card">'
        + '<div class="info"><div class="name">'+label+(quem?' · '+quem:'')+'</div><div class="meta">'+fmtDataBR(x.data)+'</div></div>'
        + '<span class="pill '+(x.tipo==='entrada'?'pago':'atrasado')+'">'+(x.tipo==='entrada'?'+':'-')+fmtMoeda(x.valor)+'</span>'
        + '<button class="btn btn-outline" style="flex:0 0 auto;padding:8px 10px;" data-action="excluirMovimentacao" data-id="'+x.id+'">✕</button>'
        + '</div>';
    });
  }
  html += '</div>';

  app.innerHTML = html;
}

function tabsHtml(){
  return '<div class="tabs">'
    + '<button class="tab-btn'+(state.screen==='dashboard'?' active':'')+'" data-action="irDashboard">Dashboard</button>'
    + '<button class="tab-btn'+(state.screen==='hoje'?' active':'')+'" data-action="irHoje">Hoje</button>'

    else if(st==='atrasado'){ totalAReceber += Number(m.valor)||0; qtdAtrasado++; }

  var totalSaidas = movDoMes.filter(function(x){ return x.tipo==='saida'; }).reduce(function(s,x){ return s+(Number(x.valor)||0); },0);

  html += '<div class="stat-row"><div class="stat areceber"><div class="lbl">Despesas fixas previstas (mês)</div><div class="num">'+fmtMoeda(totalFixas)+'</div></div></div>';

/* Inadimplência recorrente: alunos com 2+ meses (dos últimos 6) sem pagamento registrado */
function calcularRecorrentes(){
  var hoje = hojeStr();
  var mesAtual = mesAtualStr();
  var mesesRef = [];
  var d = new Date();
  for(var i=0;i<6;i++){
    mesesRef.push(d.getFullYear()+'-'+pad(d.getMonth()+1));
    d.setMonth(d.getMonth()-1);
  }
  var porAluno = {};
  state.mensalidades.forEach(function(m){
    if(mesesRef.indexOf(m.mesReferencia) === -1) return;
    var st = statusComputado(m);
    var contaComoAtraso = (m.mesReferencia !== mesAtual && st !== 'pago' && st !== 'isento') || (m.mesReferencia === mesAtual && st === 'atrasado');
    if(!contaComoAtraso) return;
    if(!porAluno[m.alunoId]) porAluno[m.alunoId] = {alunoId:m.alunoId, nomeAluno:m.nomeAluno, responsavelNome:m.responsavelNome, responsavelWhatsapp:m.responsavelWhatsapp, unidade:m.unidade, meses:[], totalDevido:0};
    porAluno[m.alunoId].meses.push(m.mesReferencia);
    porAluno[m.alunoId].totalDevido += Number(m.valor)||0;
  });
  return Object.keys(porAluno).map(function(k){ return porAluno[k]; })
    .filter(function(x){ return x.meses.length >= 2; })
    .sort(function(a,b){ return b.meses.length - a.meses.length; });
}

function renderRecorrentes(app){
  setHeader('BSA Finanças', 'conectado', false);
  var lista = calcularRecorrentes();
  var html = tabsHtml();
  html += '<p class="section-label" style="margin:14px 0 8px;font-size:12px;color:var(--ink-soft);">Alunos com 2 ou mais meses em aberto nos últimos 6 meses — maior risco de cancelamento</p>';
  if(lista.length===0){
    html += '<div class="empty">Nenhum caso de inadimplência recorrente. Tudo em dia! 🎉</div>';

    lista.forEach(function(x){
      var a = state.alunos.find(function(y){return y.id===x.alunoId;});
      var foto = a && a.foto ? '<img class="avatar" src="'+a.foto+'">' : '<div class="avatar">'+iniciais(x.nomeAluno)+'</div>';

  }
  app.innerHTML = html;

  iniciarFilaCobranca:function(){
    var mes = mesAtualStr();
    state.filaLista = state.mensalidades.filter(function(m){ return m.mesReferencia===mes && statusComputado(m)==='atrasado'; })
      .sort(function(a,b){ return diasAtraso(b)-diasAtraso(a); });
    state.filaIndex = 0;
    state.screen = 'filaCobranca';
    render();
  },
  avancarFilaCobranca:function(){ state.filaIndex++; render(); },
  pularFilaCobranca:function(){ state.filaIndex++; render(); },
  voltarInadimplentes:function(){ state.screen='inadimplentes'; render(); },
  irRecorrentes:function(){ state.screen='recorrentes'; render(); },
  irAlunos:function(){ state.screen='alunos'; render(); },
  irMovimentacoes:function(){ state.screen='movimentacoes'; render(); },
  irMovTabEntrada:function(){ state.movTab='entrada'; render(); },
  irMovTabSaida:function(){ state.movTab='saida'; render(); },
  salvarEntrada:async function(){
    var alunoId = document.getElementById('movAluno').value;
    var categoria = document.getElementById('movCategoriaEntrada').value;
    var valor = parseFloat(document.getElementById('movValorEntrada').value);
    var data = document.getElementById('movDataEntrada').value;
    var descricao = document.getElementById('movDescEntrada').value.trim();
    if(!alunoId){ showToast('Selecione o aluno.'); return; }
    if(!valor || valor<=0){ showToast('Digite um valor válido.'); return; }
    if(!data){ showToast('Informe a data.'); return; }
    var aluno = state.alunos.find(function(x){ return x.id===alunoId; });
    try{
      var ref = await db.collection('movimentacoesFinanceiras').add({
        tipo:'entrada', categoria:categoria, valor:valor, data:data, descricao:descricao,
        alunoId:alunoId, nomeAluno: aluno?aluno.nome:'', criadoEm: firebase.firestore.FieldValue.serverTimestamp()
      });
      state.movimentacoes.push({id:ref.id, tipo:'entrada', categoria:categoria, valor:valor, data:data, descricao:descricao, alunoId:alunoId, nomeAluno: aluno?aluno.nome:''});
      showToast('Entrada registrada!');
      render();
    }catch(e){ showToast('Não foi possível salvar: '+e.message); }
  },
  salvarSaida:async function(){
    var categoria = document.getElementById('movCategoriaSaida').value;
    var valor = parseFloat(document.getElementById('movValorSaida').value);
    var data = document.getElementById('movDataSaida').value;
    var descricao = document.getElementById('movDescSaida').value.trim();
    if(!valor || valor<=0){ showToast('Digite um valor válido.'); return; }
    if(!data){ showToast('Informe a data.'); return; }
    try{
      var ref = await db.collection('movimentacoesFinanceiras').add({
        tipo:'saida', categoria:categoria, valor:valor, data:data, descricao:descricao,
        alunoId:null, nomeAluno:null, criadoEm: firebase.firestore.FieldValue.serverTimestamp()
      });
      state.movimentacoes.push({id:ref.id, tipo:'saida', categoria:categoria, valor:valor, data:data, descricao:descricao, alunoId:null, nomeAluno:null});
      showToast('Saída registrada!');
      render();
    }catch(e){ showToast('Não foi possível salvar: '+e.message); }
  },
  excluirMovimentacao:async function(el){
    var id = el.dataset.id;
    if(!confirm('Excluir este lançamento?')) return;
    try{
      await db.collection('movimentacoesFinanceiras').doc(id).delete();
      state.movimentacoes = state.movimentacoes.filter(function(x){ return x.id!==id; });
      showToast('Lançamento excluído');
      render();
    }catch(e){ showToast('Não foi possível excluir: '+e.message); }
  },
  abrirAluno:function(el){ state.currentAlunoId = el.dataset.id; state.screen='alunoDetail'; render(); },
  voltar:function(){ state.screen='alunos'; render(); },
  marcarPago:async function(el){
    var id = el.dataset.id;
    try{
      await db.collection('mensalidades').doc(id).update({ statusPagamento:'pago', dataPagamento: hojeStr() });
      var m = state.mensalidades.find(function(x){return x.id===id;});
      if(m){ m.statusPagamento='pago'; m.dataPagamento=hojeStr(); }
      showToast('Marcado como pago!');
      render();
    }catch(e){ showToast('Não foi possível salvar: '+e.message); }
  },
  excluirMensalidadeOrfa:async function(el){
    var id = el.dataset.id;
    if(!confirm('Excluir este lançamento? O cadastro do aluno já não existe mais.')) return;
    try{
      await db.collection('mensalidades').doc(id).delete();
      state.mensalidades = state.mensalidades.filter(function(x){ return x.id!==id; });
      showToast('Lançamento excluído');
      render();
    }catch(e){ showToast('Não foi possível excluir: '+e.message); }
  },
  salvarConfig:async function(el){
    var id = el.dataset.id;
    var valor = parseFloat(document.getElementById('fValor').value);
    var dia = parseInt(document.getElementById('fDia').value,10);
    if(!valor || valor<=0){ showToast('Digite um valor válido.'); return; }
    try{
      await db.collection('alunos').doc(id).update({ valorMensalidade: valor, diaVencimento: dia });
      var a = state.alunos.find(function(x){return x.id===id;});
      a.valorMensalidade = valor; a.diaVencimento = dia;
      await garantirMensalidadesDoMes();
      await carregarMensalidades();
      showToast('Configuração salva!');
      render();
    }catch(e){ showToast('Não foi possível salvar: '+e.message); }
  }
};

document.addEventListener('click', function(e){
  var el = e.target.closest('[data-action]');
  if(!el) return;
  var fn = Actions[el.dataset.action];
  if(fn) fn(el);
});

initFirebase();

})();

/* Wake Lock: impede que a tela apague enquanto o módulo estiver aberto */
var __wakeLock=null;
async function __pedirWakeLock(){try{if('wakeLock' in navigator){__wakeLock=await navigator.wakeLock.request('screen');}}catch(e){}}
document.addEventListener('visibilitychange', function(){ if(document.visibilityState==='visible') __pedirWakeLock(); });
__pedirWakeLock();
</script>
</body>
</html>
